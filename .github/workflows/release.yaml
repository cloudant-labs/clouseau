name: Release 3.x

on:
  push:
    tags:
      - '*'

jobs:
  release:
    name: Release of clouseau-{version}-dist.zip
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup
      - name: Set ENV for github-release
        run: |
          echo "RELEASE_TAG=${GITHUB_REF:10}" >> $GITHUB_ENV
          echo "RELEASE_NAME=$GITHUB_WORKFLOW" >> $GITHUB_ENV

      - name: Test
        run: mise exec -- make test
      - name: Generate artifacts
        run: mise exec -- make artifacts
      - name: List artifacts
        run: ls artifacts
      - name: Create release
        run: mise exec -- make release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  docker-release:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: release
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: ./.github/actions/setup

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Build and push Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          build-args: |
            BUILD_MODE=release
            CLOUSEAU_VERSION=${{ steps.version.outputs.version }}
          tags: |
            ghcr.io/cloudant-labs/clouseau:${{ steps.version.outputs.version }}
            ghcr.io/cloudant-labs/clouseau:latest
          platforms: linux/amd64,linux/arm64
