name: Build 3.x

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Lint
        run: |
          source scripts/console.sh
          source scripts/tools.sh
          COURSIER="mise exec -- cs" tools::activate_tools
          mise exec -- make ci-lint
      - name: Unit tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: mise exec -- make test
      - name: Restart test
        run: mise exec -- make restart-test
      - name: RPC tests (zeunit)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: mise exec -- make zeunit
      - name: Concurrent RPC tests (zeunit)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: mise exec -- make concurrent-zeunit-tests
      - name: Syslog tests
        run: mise exec -- make syslog-tests
      - name: Elixir tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: mise exec -- make ci-elixir
      - name: Metrics tests (mango)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 8
          max_attempts: 3
          command: mise exec -- make metrics-tests

  docker-integration:
    name: Docker integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Generate erlang.cookie
        run: make generate-erlang-cookie
      - name: Build Clouseau Docker image (local mode)
        run: mise exec -- make docker-build MODE=local
      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2
      - name: Run docker compose
        run: make docker-compose-up
      - name: Wait for CouchDB to be ready
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 2
          max_attempts: 5
          retry_wait_seconds: 2
          command: mise exec -- make docker-wait-couchdb
      - name: Test CouchDB and Clouseau integration
        run: mise exec -- make docker-test-integration
      - name: Mango tests on Docker
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: mise exec -- make docker-mango-test
      - name: Elixir tests on Docker
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 5
          max_attempts: 3
          command: mise exec -- make docker-elixir-test
      - name: Cleanup
        if: always()
        run: |
          make clean-erlang-cookie
